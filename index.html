<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>雙發 ERP 12.1 完整操作版</title>
<style>
:root{--navy:#092f57;--blue:#145d9c;--bg:#cfd6dd;--panel:#eef1f4;--line:#405263;--sel:#ffe878;--green:#176b3a;--red:#a90000}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;font-family:"Microsoft JhengHei",Consolas,sans-serif;background:var(--bg);color:#111}button,input,select,textarea{font:inherit}button{cursor:pointer}.screen{display:none;height:100vh;width:100vw;overflow:hidden}.screen.active{display:flex;flex-direction:column}.top{height:44px;flex:0 0 44px;background:var(--navy);color:white;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-weight:800}.top .title{font-size:20px}.top .clock{font-size:14px}.status{height:34px;flex:0 0 34px;background:#e4e7ea;border-top:1px solid #7c8791;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-weight:700}.workspace{flex:1;min-height:0;padding:8px;display:flex;flex-direction:column;gap:7px}.box{background:var(--panel);border:2px solid var(--line);padding:7px;min-height:0}.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.toolbar button,.keybtn{height:34px;border:2px outset #fff;background:#d6d9dc;font-weight:800;padding:0 12px}.toolbar button:active,.keybtn:active{border-style:inset}.toolbar .primary{background:#d9ecff}.toolbar .danger{background:#ffe0e0}.fields{display:grid;grid-template-columns:repeat(6,minmax(110px,1fr));gap:6px}.field label{display:block;font-size:12px;font-weight:800;margin-bottom:2px}.field input,.field select,.field textarea{width:100%;height:32px;border:1px solid #111;background:#fff;padding:4px 6px}.field textarea{height:64px;resize:none}.field input:focus,.field select:focus,.field textarea:focus,button:focus,tr:focus{outline:3px solid #ff9f00;outline-offset:0}.tablewrap{flex:1;min-height:0;overflow:auto;border:2px inset #fff;background:#fff}.tablewrap table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}.tablewrap th{position:sticky;top:0;background:var(--navy);color:#fff;padding:5px;border:1px solid #415a72;z-index:2}.tablewrap td{padding:4px 5px;border:1px solid #8e969d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:27px}.tablewrap tbody tr{cursor:pointer}.tablewrap tbody tr:hover,.tablewrap tbody tr.selected,.tablewrap tbody tr:focus{background:var(--sel);color:#000}.home{background:#102f4d;color:white;align-items:center;justify-content:center}.homecard{width:min(1050px,94vw);height:min(760px,92vh);border:4px double #dcecff;background:#0a2742;padding:18px;display:flex;flex-direction:column}.brand{text-align:center;font-size:30px;font-weight:900;padding:10px;border-bottom:2px solid #9ec3e8}.subtitle{text-align:center;margin:8px 0 16px;color:#c6ddf5}.menugrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1}.menuitem{border:2px outset #cae1f7;background:#dbeafa;color:#082744;font-size:21px;font-weight:900;display:flex;align-items:center;justify-content:center;min-height:80px}.menuitem:focus,.menuitem:hover{background:var(--sel)}.homefoot{text-align:center;margin-top:14px;color:#d7e7f7}.split{flex:1;min-height:0;display:grid;grid-template-columns:62% 38%;gap:7px}.editor{overflow:hidden;display:flex;flex-direction:column}.editor .fields{grid-template-columns:repeat(2,minmax(130px,1fr));overflow:auto}.editor-actions{margin-top:auto;padding-top:7px;display:flex;gap:6px}.posgrid{flex:1;min-height:0;display:grid;grid-template-columns:66% 34%;gap:7px}.pos-left,.pos-right{min-height:0;display:flex;flex-direction:column;gap:7px}.pos-total{font-size:40px;font-weight:900;text-align:right;color:#082744}.paygrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.paygrid button{height:44px;font-weight:900;border:2px outset white}.summarygrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.metric{border:2px inset white;background:#fff;padding:7px;text-align:right}.metric small{display:block;text-align:left;font-weight:800}.metric b{font-size:22px}.hidden{display:none!important}@media(max-width:1100px){.fields{grid-template-columns:repeat(4,1fr)}.split{grid-template-columns:58% 42%}.menugrid{grid-template-columns:repeat(3,1fr)}}
</style></head><body>
<section id="home" class="screen home active"><div class="homecard"><div class="brand">雙發 ERP Professional 12.1</div><div class="subtitle">水電五金材料行｜固定全畫面｜鍵盤優先｜不需捲動整頁</div><div class="menugrid" id="menu"></div><div class="homefoot">方向鍵移動　Enter 確認　Esc 返回首頁　F11 全螢幕</div></div></section>
<div id="screens"></div>
<script src="js/data.js"></script>
<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const money=n=>Number(n||0).toLocaleString('zh-TW'); const today=()=>new Date().toISOString().slice(0,10);
let db={products:[],customers:[],suppliers:[],sales:JSON.parse(localStorage.getItem('erp12_sales')||'[]'),purchases:JSON.parse(localStorage.getItem('erp12_purchases')||'[]'),closes:JSON.parse(localStorage.getItem('erp12_closes')||'[]')};
try{db.products=JSON.parse(localStorage.getItem('erp12_products')||'null')||ERP1003_PRODUCTS||[];db.customers=JSON.parse(localStorage.getItem('erp12_customers')||'null')||ERP1003_CUSTOMERS||[];db.suppliers=JSON.parse(localStorage.getItem('erp12_suppliers')||'null')||ERP1003_SUPPLIERS||[]}catch(e){console.error(e)}
function save(){localStorage.setItem('erp12_products',JSON.stringify(db.products));localStorage.setItem('erp12_customers',JSON.stringify(db.customers));localStorage.setItem('erp12_suppliers',JSON.stringify(db.suppliers));localStorage.setItem('erp12_sales',JSON.stringify(db.sales));localStorage.setItem('erp12_purchases',JSON.stringify(db.purchases));localStorage.setItem('erp12_closes',JSON.stringify(db.closes))}
const modules=[['1','POS 收銀','pos'],['2','商品資料','products'],['3','客戶／會員','customers'],['4','廠商資料','suppliers'],['5','進貨管理','purchase'],['6','銷貨查詢','sales'],['7','庫存查詢','inventory'],['8','每日結帳','close'],['9','報表中心','reports'],['0','系統設定','settings']];
$('#menu').innerHTML=modules.map(([k,n,id])=>`<button class="menuitem" data-open="${id}">${k}. ${n}</button>`).join('');
function shell(id,title,body){return `<section id="${id}" class="screen"><div class="top"><div class="title">${title}</div><div class="clock">雙發水電五金材料行　<span class="now"></span></div></div><div class="workspace">${body}</div><div class="status"><span>F2新增　F3修改　F5查詢　F8儲存　F9列印　ESC首頁</span><span class="msg">就緒</span></div></section>`}
function table(cols,id){return `<div class="tablewrap"><table><thead><tr>${cols.map(c=>`<th style="width:${c[2]||'auto'}">${c[1]}</th>`).join('')}</tr></thead><tbody id="${id}"></tbody></table></div>`}
const screens=$('#screens');
screens.innerHTML=
shell('pos','POS 收銀',`<div class="posgrid"><div class="pos-left"><div class="box fields"><div class="field"><label>會員／客戶</label><input id="posCustomer" placeholder="輸入編號、電話或姓名"></div><div class="field"><label>商品編號／條碼／品名</label><input id="posProduct" placeholder="輸入後按 Enter"></div><div class="field"><label>數量</label><input id="posQty" type="number" value="1"></div><div class="field"><label>售價</label><input id="posPrice" type="number"></div><div class="field"><label>交易方式</label><select id="posTax"><option>一般</option><option>三聯</option></select></div><div class="field"><label>施工地址</label><input id="posSite"></div></div>${table([['code','商品編號','15%'],['name','品名','33%'],['qty','數量','10%'],['price','單價','14%'],['subtotal','小計','16%'],['x','','8%']],'posBody')}</div><div class="pos-right"><div class="box"><div>客戶：<b id="posCustomerName">一般客戶</b></div><div>會員等級：<b id="posCustomerLevel">一般</b></div></div><div class="box"><div>應收合計</div><div class="pos-total" id="posTotal">$0</div></div><div class="box paygrid" id="payments">${['現金','信用卡','LINE Pay','街口支付','全支付','匯款','月結','取消'].map(x=>`<button>${x}</button>`).join('')}</div><div class="box fields" style="grid-template-columns:1fr 1fr"><div class="field"><label>實收</label><input id="posReceived" type="number"></div><div class="field"><label>找零</label><input id="posChange" readonly></div></div><button class="keybtn" id="posCheckout" style="height:54px;background:#dff4df">F8 完成結帳</button></div></div>`)+
shell('products','商品資料',`<div class="box toolbar"><input id="productQ" style="width:420px;height:34px" placeholder="商品編號、型號、品名、廠商編號"><button data-action="new">F2 新增</button><button data-action="save" class="primary">F8 儲存</button><span>商品 ${db.products.length.toLocaleString()} 筆</span></div><div class="split"><div style="display:flex;flex-direction:column;min-height:0">${table([['code','商品編號','14%'],['model','型號','17%'],['name','品名','31%'],['v1','第一廠商','12%'],['v2','第二廠商','12%'],['stock','庫存','8%']],'productBody')}</div><div class="box editor"><div class="fields" id="productEditor"></div><div class="editor-actions"><button data-action="save">F8 儲存</button><button data-action="delete" class="danger">F4 刪除</button></div></div></div>`)+
shell('customers','客戶／會員資料',`<div class="box toolbar"><input id="customerQ" style="width:420px;height:34px" placeholder="客戶編號、姓名、電話、地址"><button data-action="new">F2 新增</button><button data-action="save">F8 儲存</button><span>客戶 ${db.customers.length.toLocaleString()} 筆</span></div><div class="split"><div style="display:flex;flex-direction:column;min-height:0">${table([['code','客戶編號','15%'],['name','客戶名稱','26%'],['phone','電話','18%'],['address','地址','31%'],['level','等級','10%']],'customerBody')}</div><div class="box editor"><div class="fields" id="customerEditor"></div><div class="editor-actions"><button data-action="save">F8 儲存</button><button data-action="delete" class="danger">F4 刪除</button></div></div></div>`)+
shell('suppliers','廠商資料',`<div class="box toolbar"><input id="supplierQ" style="width:420px;height:34px" placeholder="廠商編號、名稱、聯絡人、電話"><button data-action="new">F2 新增</button><button data-action="save">F8 儲存</button><span>廠商 ${db.suppliers.length.toLocaleString()} 筆</span></div><div class="split"><div style="display:flex;flex-direction:column;min-height:0">${table([['code','廠商編號','14%'],['name','廠商名稱','29%'],['contact','聯絡人','15%'],['phone','電話','18%'],['address','地址','24%']],'supplierBody')}</div><div class="box editor"><div class="fields" id="supplierEditor"></div><div class="editor-actions"><button data-action="save">F8 儲存</button><button data-action="delete" class="danger">F4 刪除</button></div></div></div>`)+
shell('purchase','進貨管理',`<div class="box fields"><div class="field"><label>日期</label><input id="purDate" type="date" value="${today()}"></div><div class="field"><label>廠商編號／名稱</label><input id="purSupplier"></div><div class="field"><label>商品</label><input id="purProduct"></div><div class="field"><label>數量</label><input id="purQty" type="number" value="1"></div><div class="field"><label>進價</label><input id="purCost" type="number"></div><div class="field"><label>單號</label><input id="purNo" value="PO${Date.now().toString().slice(-8)}"></div></div>${table([['no','單號','16%'],['date','日期','12%'],['supplier','廠商','22%'],['product','商品','24%'],['qty','數量','10%'],['amount','金額','16%']],'purchaseBody')}<div class="box toolbar"><button id="purAdd">Enter 加入進貨</button><button onclick="window.print()">F9 列印</button></div>`)+
shell('sales','銷貨查詢',`<div class="box toolbar"><input id="salesQ" style="width:420px;height:34px" placeholder="單號、客戶、商品、付款方式"><button onclick="renderSales()">F5 查詢</button></div>${table([['no','單號','15%'],['date','日期時間','17%'],['customer','客戶','20%'],['payment','付款','14%'],['items','品項','12%'],['total','金額','16%']],'salesBody')}`)+
shell('inventory','庫存查詢',`<div class="box toolbar"><input id="inventoryQ" style="width:420px;height:34px" placeholder="商品編號、型號、品名、廠商"><button onclick="renderInventory()">F5 查詢</button></div>${table([['code','商品編號','15%'],['model','型號','18%'],['name','品名','34%'],['vendor','廠商','13%'],['stock','庫存','10%'],['price','售價','10%']],'inventoryBody')}`)+
shell('close','每日結帳',`<div class="box fields"><div class="field"><label>結帳日期</label><input id="closeDate" type="date" value="${today()}"></div><div class="field"><label>開店現金</label><input id="openCash" type="number" value="0"></div><div class="field"><label>實際現金</label><input id="actualCash" type="number" value="0"></div><div class="field"><label>其他調整</label><input id="cashAdjust" type="number" value="0"></div></div><div class="summarygrid" id="closeMetrics"></div><div class="box toolbar"><button id="doClose">F8 儲存日結</button><button onclick="window.print()">F9 列印</button></div>${table([['date','日期','15%'],['sales','銷售','16%'],['cash','現金','16%'],['purchase','進貨','16%'],['expected','預計現金','18%'],['diff','差額','18%']],'closeBody')}`)+
shell('reports','報表中心',`<div class="summarygrid" id="reportMetrics"></div><div class="box toolbar"><button onclick="renderReports()">重新計算</button><button onclick="window.print()">F9 列印</button></div>${table([['date','日期','20%'],['sales','銷售額','20%'],['purchase','進貨額','20%'],['profit','估計毛利','20%'],['orders','銷售筆數','20%']],'reportBody')}`)+
shell('settings','系統設定',`<div class="box"><h2>資料與備份</h2><p>商品 ${db.products.length.toLocaleString()} 筆、客戶 ${db.customers.length.toLocaleString()} 筆、廠商 ${db.suppliers.length.toLocaleString()} 筆。</p><div class="toolbar"><button id="exportBtn">匯出備份</button><label class="keybtn" style="display:inline-flex;align-items:center">匯入備份<input id="importFile" type="file" accept="application/json" hidden></label><button id="fullscreenBtn">F11 全螢幕</button></div></div><div class="box"><h2>操作原則</h2><p>首頁只顯示功能選項；進入功能後整頁只顯示該功能。整頁不捲動，只有資料表內部可上下移動。</p></div>`);
function show(id){$$('.screen').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');$('.now',$('#'+id))?.replaceChildren(new Date().toLocaleString('zh-TW')); if(id==='products')renderProducts();if(id==='customers')renderCustomers();if(id==='suppliers')renderSuppliers();if(id==='sales')renderSales();if(id==='inventory')renderInventory();if(id==='purchase')renderPurchases();if(id==='close')renderClose();if(id==='reports')renderReports(); setTimeout(()=>$('#'+id+' input, #'+id+' button')?.focus(),30)}
$$('[data-open]').forEach(b=>b.onclick=()=>show(b.dataset.open));
function fieldsHtml(obj,defs,prefix){return defs.map(([k,n,t='text'])=>`<div class="field"><label>${n}</label>${t==='textarea'?`<textarea data-field="${k}">${obj?.[k]??''}</textarea>`:`<input type="${t}" data-field="${k}" value="${String(obj?.[k]??'').replaceAll('"','&quot;')}">`}</div>`).join('')}
let selP=null,selC=null,selS=null;
function pCode(p){return p.code||p.productCode||p.id||''} function pModel(p){return p.model||p.spec||p.id||''} function pName(p){return p.name||p.description||p.productName||''} function pV1(p){return p.vendor1||p.FVEND1||p.supplierCode||p.primarySupplierCode||''} function pV2(p){return p.vendor2||p.FVEND2||''} function pStock(p){return Number(p.stock??p.qty??p.inventory??0)} function pPrice(p){return Number(p.price??p.sellingPrice??p.suggested??0)}
function renderProducts(){let q=($('#productQ')?.value||'').toLowerCase();let rows=db.products.filter(p=>[pCode(p),pModel(p),pName(p),pV1(p),pV2(p),p.vendorX||p.FVENDX].join(' ').toLowerCase().includes(q)).slice(0,500);$('#productBody').innerHTML=rows.map((p,i)=>`<tr tabindex="0" data-i="${db.products.indexOf(p)}"><td>${pCode(p)}</td><td>${pModel(p)}</td><td>${pName(p)}</td><td>${pV1(p)}</td><td>${pV2(p)}</td><td>${pStock(p)}</td></tr>`).join('');bindRows('#productBody',i=>editProduct(i))}
function editProduct(i){selP=i;let p=db.products[i];$('#productEditor').innerHTML=fieldsHtml({code:pCode(p),model:pModel(p),name:pName(p),barcode:p.barcode||'',vendor1:pV1(p),vendor2:pV2(p),vendorX:p.vendorX||p.FVENDX||'',primarySupplierCode:p.primarySupplierCode||pV1(p),stock:pStock(p),price:pPrice(p),cost:p.cost||p.dealer||0,category:p.category||'',brand:p.brand||'',note:p.note||''},[['code','商品編號'],['model','型號'],['name','商品名稱'],['barcode','條碼'],['vendor1','第一廠商編號'],['vendor2','第二廠商編號'],['vendorX','其他廠商編號'],['primarySupplierCode','主供應廠商'],['stock','庫存','number'],['price','售價','number'],['cost','成本','number'],['category','分類'],['brand','品牌'],['note','備註','textarea']])}
function renderCustomers(){let q=($('#customerQ')?.value||'').toLowerCase();let rows=db.customers.filter(c=>[c.code,c.name,c.phone,c.address,c.level].join(' ').toLowerCase().includes(q)).slice(0,500);$('#customerBody').innerHTML=rows.map(c=>`<tr tabindex="0" data-i="${db.customers.indexOf(c)}"><td>${c.code||''}</td><td>${c.name||''}</td><td>${c.phone||''}</td><td>${c.address||''}</td><td>${c.level||c.type||''}</td></tr>`).join('');bindRows('#customerBody',i=>editCustomer(i))}
function editCustomer(i){selC=i;let c=db.customers[i];$('#customerEditor').innerHTML=fieldsHtml(c,[['code','客戶編號'],['name','客戶名稱'],['phone','電話'],['mobile','手機'],['address','地址'],['taxNo','統一編號'],['level','會員等級'],['points','點數','number'],['credit','信用額度','number'],['payment','付款方式'],['invoiceType','發票方式'],['siteAddress','施工地址'],['note','備註','textarea']])}
function renderSuppliers(){let q=($('#supplierQ')?.value||'').toLowerCase();let rows=db.suppliers.filter(s=>[s.code,s.name,s.contact,s.phone,s.address].join(' ').toLowerCase().includes(q)).slice(0,500);$('#supplierBody').innerHTML=rows.map(s=>`<tr tabindex="0" data-i="${db.suppliers.indexOf(s)}"><td>${s.code||''}</td><td>${s.name||''}</td><td>${s.contact||''}</td><td>${s.phone||''}</td><td>${s.address||''}</td></tr>`).join('');bindRows('#supplierBody',i=>editSupplier(i))}
function editSupplier(i){selS=i;let s=db.suppliers[i];$('#supplierEditor').innerHTML=fieldsHtml(s,[['code','廠商編號'],['name','廠商名稱'],['contact','聯絡人'],['phone','電話'],['address','地址'],['taxNo','統一編號'],['email','Email'],['credit','信用額度','number'],['paymentTerms','付款條件'],['note','備註','textarea']])}
function bindRows(sel,fn){$$(sel+' tr').forEach(r=>{r.onclick=()=>{ $$(sel+' tr').forEach(x=>x.classList.remove('selected'));r.classList.add('selected');fn(+r.dataset.i)};r.ondblclick=r.onclick;r.onkeydown=e=>{if(e.key==='Enter')r.onclick();if(e.key==='ArrowDown'){e.preventDefault();r.nextElementSibling?.focus()}if(e.key==='ArrowUp'){e.preventDefault();r.previousElementSibling?.focus()}}})}
['productQ','customerQ','supplierQ'].forEach(id=>$('#'+id).addEventListener('input',()=>id==='productQ'?renderProducts():id==='customerQ'?renderCustomers():renderSuppliers()));
function editorSave(type){let map={products:[selP,'#productEditor'],customers:[selC,'#customerEditor'],suppliers:[selS,'#supplierEditor']};let [idx,ed]=map[type];if(idx===null)return;let obj=db[type][idx];$$(ed+' [data-field]').forEach(x=>obj[x.dataset.field]=x.type==='number'?Number(x.value):x.value);if(type==='products'){obj.id=obj.code||obj.id;obj.description=obj.name||obj.description;obj.model=obj.model||obj.id;obj.vendor1=obj.vendor1;obj.vendor2=obj.vendor2;obj.stock=Number(obj.stock);obj.price=Number(obj.price)}save();type==='products'?renderProducts():type==='customers'?renderCustomers():renderSuppliers()}
$$('[data-action="save"]').forEach(b=>b.onclick=()=>editorSave(b.closest('.screen').id));
$$('[data-action="new"]').forEach(b=>{b.onclick=()=>{let t=b.closest('.screen').id;if(t==='products'){db.products.unshift({code:'',model:'',name:'',stock:0,price:0});selP=0;editProduct(0)}if(t==='customers'){db.customers.unshift({code:'',name:'',phone:'',address:''});selC=0;editCustomer(0)}if(t==='suppliers'){db.suppliers.unshift({code:'',name:'',phone:'',address:''});selS=0;editSupplier(0)}}});
$$('[data-action="delete"]').forEach(b=>b.onclick=()=>{let t=b.closest('.screen').id,idx=t==='products'?selP:t==='customers'?selC:selS;if(idx===null||!confirm('確定刪除此筆資料？'))return;db[t].splice(idx,1);save();t==='products'?renderProducts():t==='customers'?renderCustomers():renderSuppliers()});
let cart=[],currentCustomer=null,payment='現金';
function findProduct(q){q=q.toLowerCase();return db.products.find(p=>[pCode(p),pModel(p),pName(p),p.barcode].some(v=>String(v||'').toLowerCase()===q))||db.products.find(p=>[pCode(p),pModel(p),pName(p)].join(' ').toLowerCase().includes(q))}
$('#posProduct').onkeydown=e=>{if(e.key==='Enter'){let p=findProduct(e.target.value.trim());if(!p)return alert('找不到商品');let qty=Number($('#posQty').value)||1,price=Number($('#posPrice').value)||pPrice(p);cart.push({code:pCode(p),name:pName(p),qty,price,subtotal:qty*price});e.target.value='';$('#posQty').value=1;$('#posPrice').value='';renderCart()}}
$('#posCustomer').onkeydown=e=>{if(e.key==='Enter'){let q=e.target.value.toLowerCase();currentCustomer=db.customers.find(c=>[c.code,c.phone,c.mobile,c.name].join(' ').toLowerCase().includes(q));$('#posCustomerName').textContent=currentCustomer?.name||'一般客戶';$('#posCustomerLevel').textContent=currentCustomer?.level||currentCustomer?.type||'一般';$('#posProduct').focus()}}
function renderCart(){$('#posBody').innerHTML=cart.map((x,i)=>`<tr><td>${x.code}</td><td>${x.name}</td><td>${x.qty}</td><td>${money(x.price)}</td><td>${money(x.subtotal)}</td><td><button onclick="cart.splice(${i},1);renderCart()">刪</button></td></tr>`).join('');let t=cart.reduce((a,b)=>a+b.subtotal,0);$('#posTotal').textContent='$'+money(t);$('#posReceived').oninput=()=>$('#posChange').value=Number($('#posReceived').value||0)-t}
$$('#payments button').forEach(b=>b.onclick=()=>{payment=b.textContent;if(payment==='取消'){cart=[];renderCart();payment='現金'}});$('#posCheckout').onclick=checkout;
function checkout(){if(!cart.length)return alert('尚未輸入商品');let total=cart.reduce((a,b)=>a+b.subtotal,0);if($('#posTax').value==='三聯')total=Math.round(total/1.05);db.sales.unshift({no:'SO'+Date.now().toString().slice(-10),date:new Date().toISOString(),customer:currentCustomer?.name||'一般客戶',payment,total,items:structuredClone(cart)});cart.forEach(ci=>{let p=db.products.find(x=>pCode(x)===ci.code);if(p)p.stock=pStock(p)-ci.qty});if(currentCustomer){currentCustomer.totalSpent=Number(currentCustomer.totalSpent||0)+total;currentCustomer.points=Number(currentCustomer.points||0)+Math.floor(total/100)}save();alert('結帳完成：$'+money(total));cart=[];currentCustomer=null;$('#posCustomer').value='';$('#posCustomerName').textContent='一般客戶';renderCart();$('#posProduct').focus()}
function renderSales(){let q=($('#salesQ')?.value||'').toLowerCase();$('#salesBody').innerHTML=db.sales.filter(s=>[s.no,s.customer,s.payment,s.items.map(x=>x.name).join(' ')].join(' ').toLowerCase().includes(q)).slice(0,1000).map(s=>`<tr><td>${s.no}</td><td>${new Date(s.date).toLocaleString('zh-TW')}</td><td>${s.customer}</td><td>${s.payment}</td><td>${s.items.length}</td><td>${money(s.total)}</td></tr>`).join('')}
function renderInventory(){let q=($('#inventoryQ')?.value||'').toLowerCase();$('#inventoryBody').innerHTML=db.products.filter(p=>[pCode(p),pModel(p),pName(p),pV1(p)].join(' ').toLowerCase().includes(q)).slice(0,1000).map(p=>`<tr><td>${pCode(p)}</td><td>${pModel(p)}</td><td>${pName(p)}</td><td>${pV1(p)}</td><td>${pStock(p)}</td><td>${money(pPrice(p))}</td></tr>`).join('')}
$('#purAdd').onclick=()=>{let p=findProduct($('#purProduct').value);if(!p)return alert('找不到商品');let q=Number($('#purQty').value)||1,c=Number($('#purCost').value)||Number(p.cost||p.dealer||0);let sQ=$('#purSupplier').value.toLowerCase(),s=db.suppliers.find(x=>[x.code,x.name].join(' ').toLowerCase().includes(sQ));db.purchases.unshift({no:$('#purNo').value,date:$('#purDate').value,supplier:s?.name||$('#purSupplier').value,product:pName(p),productCode:pCode(p),qty:q,cost:c,amount:q*c});p.stock=pStock(p)+q;p.cost=c;save();renderPurchases();$('#purProduct').value='';$('#purProduct').focus()};
function renderPurchases(){$('#purchaseBody').innerHTML=db.purchases.slice(0,1000).map(x=>`<tr><td>${x.no}</td><td>${x.date}</td><td>${x.supplier}</td><td>${x.product}</td><td>${x.qty}</td><td>${money(x.amount)}</td></tr>`).join('')}
function daily(date){let sales=db.sales.filter(s=>s.date.slice(0,10)===date),purs=db.purchases.filter(p=>p.date===date);let by={};sales.forEach(s=>by[s.payment]=(by[s.payment]||0)+s.total);return {sales:sales.reduce((a,b)=>a+b.total,0),purchase:purs.reduce((a,b)=>a+b.amount,0),cash:by['現金']||0,by,orders:sales.length}}
function renderClose(){let d=$('#closeDate').value,x=daily(d),open=Number($('#openCash').value)||0,adj=Number($('#cashAdjust').value)||0,expected=open+x.cash+adj;$('#closeMetrics').innerHTML=[['銷售總額',x.sales],['現金銷售',x.cash],['進貨總額',x.purchase],['預計現金',expected]].map(v=>`<div class="metric"><small>${v[0]}</small><b>$${money(v[1])}</b></div>`).join('');$('#closeBody').innerHTML=db.closes.map(c=>`<tr><td>${c.date}</td><td>${money(c.sales)}</td><td>${money(c.cash)}</td><td>${money(c.purchase)}</td><td>${money(c.expected)}</td><td>${money(c.diff)}</td></tr>`).join('')}
['closeDate','openCash','actualCash','cashAdjust'].forEach(id=>$('#'+id).oninput=renderClose);$('#doClose').onclick=()=>{let d=$('#closeDate').value,x=daily(d),expected=(Number($('#openCash').value)||0)+x.cash+(Number($('#cashAdjust').value)||0),actual=Number($('#actualCash').value)||0;let c={date:d,...x,expected,diff:actual-expected};let i=db.closes.findIndex(z=>z.date===d);if(i>=0)db.closes[i]=c;else db.closes.unshift(c);save();renderClose();alert('日結已儲存')}
function renderReports(){let dates=[...new Set([...db.sales.map(x=>x.date.slice(0,10)),...db.purchases.map(x=>x.date)])].sort().reverse().slice(0,100);let totalSales=db.sales.reduce((a,b)=>a+b.total,0),totalPur=db.purchases.reduce((a,b)=>a+b.amount,0);$('#reportMetrics').innerHTML=[['累積銷售',totalSales],['累積進貨',totalPur],['估計差額',totalSales-totalPur],['銷售筆數',db.sales.length]].map(v=>`<div class="metric"><small>${v[0]}</small><b>${v[0].includes('筆')?money(v[1]):'$'+money(v[1])}</b></div>`).join('');$('#reportBody').innerHTML=dates.map(d=>{let x=daily(d);return `<tr><td>${d}</td><td>${money(x.sales)}</td><td>${money(x.purchase)}</td><td>${money(x.sales-x.purchase)}</td><td>${x.orders}</td></tr>`}).join('')}
$('#exportBtn').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db)],{type:'application/json'}));a.download='雙發ERP備份_'+today()+'.json';a.click()};$('#importFile').onchange=e=>{let r=new FileReader;r.onload=()=>{db=JSON.parse(r.result);save();location.reload()};r.readAsText(e.target.files[0])};$('#fullscreenBtn').onclick=()=>document.documentElement.requestFullscreen?.();
document.addEventListener('keydown',e=>{let active=$('.screen.active')?.id;if(e.key==='Escape'&&active!=='home'){e.preventDefault();show('home')}if(e.key==='F11'){e.preventDefault();document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.()}if(active==='home'){let m=modules.find(x=>x[0]===e.key);if(m){e.preventDefault();show(m[2])}let items=$$('.menuitem'),i=items.indexOf(document.activeElement);if(['ArrowRight','ArrowLeft','ArrowDown','ArrowUp'].includes(e.key)){e.preventDefault();if(i<0)i=0;let c=4;i+=e.key==='ArrowRight'?1:e.key==='ArrowLeft'?-1:e.key==='ArrowDown'?c:-c;i=Math.max(0,Math.min(items.length-1,i));items[i].focus()}}if(e.key==='F8'){if(active==='pos')checkout();if(['products','customers','suppliers'].includes(active))editorSave(active);if(active==='close')$('#doClose').click()}if(e.key==='F2'&&['products','customers','suppliers'].includes(active))$('#'+active+' [data-action="new"]').click()});
setInterval(()=>$$('.now').forEach(x=>x.textContent=new Date().toLocaleString('zh-TW')),1000);setTimeout(()=>$('.menuitem').focus(),100);
</script></body></html>
